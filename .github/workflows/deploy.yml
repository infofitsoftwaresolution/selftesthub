name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.GH_PAT }}
        repository: infofitsoftware/infofitscore
        ref: main

    - name: Get GitHub Actions IP
      id: ip
      uses: haythem/public-ip@v1.2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Add GitHub Actions IP to EC2 security group
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Create the directory if it doesn't exist
          mkdir -p /home/ubuntu/infofitscore
          
          # Configure git
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Set up credentials
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials
          
          # Initialize and update repository
          cd /home/ubuntu/infofitscore
          
          if [ ! -d ".git" ]; then
            # If not a git repo, initialize and set remote
            git init
            git remote add origin https://github.com/infofitsoftware/infofitscore.git
            git fetch
            git checkout main
          else
            # If already a git repo, just pull changes
            git pull origin main
          fi
          
          # Export environment variables
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export EC2_PUBLIC_IP="${{ secrets.EC2_PUBLIC_IP }}"
          
          # Run deployment script
          bash deploy.sh

    - name: Remove GitHub Actions IP from security group
      if: always()
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 