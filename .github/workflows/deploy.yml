name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Get GitHub Actions IP
      id: ip
      uses: haythem/public-ip@v1.2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Add GitHub Actions IP to EC2 security group
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    - name: Setup Docker on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install Docker if not installed
          if ! command -v docker &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
            sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            sudo apt-get update
            sudo apt-get install -y docker-ce
          fi

          # Install Docker Compose if not installed
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Add user to docker group and restart Docker
          sudo usermod -aG docker ubuntu
          sudo systemctl restart docker

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Fix Docker permissions
          sudo mkdir -p /home/ubuntu/.docker
          sudo chown -R ubuntu:ubuntu /home/ubuntu/.docker
          sudo chmod -R 755 /home/ubuntu/.docker
          
          # Stop any running services
          cd /home/ubuntu/infofitscore || true
          docker-compose down || true
          cd /home/ubuntu
          
          # Clean up and prepare directory with correct permissions
          sudo rm -rf infofitscore
          mkdir infofitscore
          cd infofitscore
          
          # Initialize git repo with main branch
          git init -b main
          sudo chown -R ubuntu:ubuntu .
          sudo chmod -R 755 .
          
          # Configure git
          git config --local user.email "infofitsoftware@gmail.com"
          git config --local user.name "infofitsoftware"
          
          # Try to add remote and fetch code (with error handling)
          echo "Attempting to clone repository..."
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            # Use GitHub PAT if available
            git remote add origin https://${{ secrets.GH_PAT }}@github.com/infofitsoftware/infofitscore.git
          else
            # Fallback to public repository
            git remote add origin https://github.com/infofitsoftware/infofitscore.git
          fi
          
          # Try to fetch and reset (with error handling)
          if git fetch origin main; then
            git reset --hard origin/main
            git branch --set-upstream-to=origin/main main
            echo "Successfully cloned repository"
          else
            echo "Warning: Could not fetch from repository. Continuing with local deployment..."
            # Create basic structure if git fetch fails
            mkdir -p backend frontend nginx
            echo "Created basic directory structure"
          fi
          
          # Set proper permissions
          echo "Setting proper permissions..."
          sudo chown -R ubuntu:ubuntu .
          sudo find . -type d -exec chmod 755 {} \;
          sudo find . -type f -exec chmod 644 {} \;
          
          # Make all shell scripts executable
          find . -type f -name "*.sh" -exec chmod +x {} \;
          
          # Specifically ensure entrypoint.sh is executable
          if [ -f "backend/entrypoint.sh" ]; then
            chmod +x backend/entrypoint.sh
            echo "Made backend/entrypoint.sh executable"
          else
            echo "Warning: backend/entrypoint.sh not found"
          fi
          
          # Set environment variables
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export DOMAIN_NAME="selftesthub.com"
          
          # Update nginx configuration for proper domain handling
          echo "Updating nginx configuration for domain redirects..."
          cat > nginx/conf.d/app.conf << 'EOF'
          # Add at the beginning of the file
          error_log /var/log/nginx/error.log debug;
          access_log /var/log/nginx/access.log combined;
          
          # HTTP - redirect all requests to HTTPS www version
          server {
              listen 80;
              server_name selftesthub.com www.selftesthub.com utrains.selftesthub.com;
              return 301 https://www.selftesthub.com$request_uri;
          }
          
          # HTTPS - redirect non-www to www
          server {
              listen 443 ssl;
              server_name selftesthub.com;
              ssl_certificate /etc/nginx/ssl/live/selftesthub.com/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/live/selftesthub.com/privkey.pem;
              return 301 https://www.selftesthub.com$request_uri;
          }
          
          # HTTPS - redirect subdomain to main domain
          server {
              listen 443 ssl;
              server_name utrains.selftesthub.com;
              ssl_certificate /etc/nginx/ssl/live/selftesthub.com/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/live/selftesthub.com/privkey.pem;
              return 301 https://www.selftesthub.com$request_uri;
          }
          
          # HTTPS - main server block
          server {
              listen 443 ssl;
              server_name www.selftesthub.com;
          
              ssl_certificate /etc/nginx/ssl/live/selftesthub.com/fullchain.pem;
              ssl_certificate_key /etc/nginx/ssl/live/selftesthub.com/privkey.pem;
          
              # SSL configurations
              ssl_protocols TLSv1.2 TLSv1.3;
              ssl_prefer_server_ciphers on;
              ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
          
              # Frontend
              location / {
                  proxy_pass https://frontend:3000;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_cache_bypass $http_upgrade;
                  
                  # Add security headers
                  add_header X-Frame-Options "SAMEORIGIN";
                  add_header X-XSS-Protection "1; mode=block";
                  add_header X-Content-Type-Options "nosniff";
              }
          
              # Backend API
              location /api/v1/ {
                  proxy_pass https://backend:8000/api/v1/;
                  proxy_http_version 1.1;
                  proxy_set_header Upgrade $http_upgrade;
                  proxy_set_header Connection "upgrade";
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
              }
          
              # Add inside http block
              limit_req_zone $binary_remote_addr zone=one:10m rate=1r/s;
          
              # Add inside location blocks
              limit_req zone=one burst=5 nodelay;
          }
          EOF
          
          # Ensure SSL certificate includes subdomain
          echo "Checking SSL certificate for subdomain..."
          if [ -f "nginx/ssl/live/selftesthub.com/fullchain.pem" ]; then
            if ! openssl x509 -in nginx/ssl/live/selftesthub.com/fullchain.pem -text -noout | grep -q "utrains.selftesthub.com"; then
              echo "Subdomain not found in certificate, renewing SSL certificate..."
              sudo ./setup-ssl.sh
            else
              echo "SSL certificate includes subdomain"
            fi
          fi
          
          # Check if deploy.sh exists and is executable
          if [ -f "deploy.sh" ]; then
            chmod +x deploy.sh
            echo "Found deploy.sh, running deployment..."
            ./deploy.sh
          else
            echo "Error: deploy.sh not found"
            exit 1
          fi

    - name: Remove GitHub Actions IP from security group
      if: always()
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 