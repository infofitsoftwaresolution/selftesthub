name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        token: ${{ secrets.GH_PAT }}  # Personal Access Token for private repo access
        repository: infofitsoftware/infofitscore
        ref: main

    - name: Get GitHub Actions IP
      id: ip
      uses: haythem/public-ip@v1.2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Add GitHub Actions IP to EC2 security group
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}  # This will use your .pem file content
        script: |
          # Configure git for private repo access
          git config --global credential.helper store
          echo "https://${{ secrets.GH_PAT }}@github.com" > ~/.git-credentials
          
          # Clone repository if it doesn't exist
          if [ ! -d "/home/ubuntu/mcq-exam-system" ]; then
            git clone https://github.com/infofitsoftware/infofitscore.git /home/ubuntu/mcq-exam-system
          fi
          
          # Export environment variables
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export EC2_PUBLIC_IP="${{ secrets.EC2_PUBLIC_IP }}"
          
          # Run deployment script
          cd /home/ubuntu/mcq-exam-system
          git pull
          bash deploy.sh

    - name: Remove GitHub Actions IP from security group
      if: always()
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 