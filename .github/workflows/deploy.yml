name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Get GitHub Actions IP
      id: ip
      uses: haythem/public-ip@v1.2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Add GitHub Actions IP to EC2 security group
      run: |
        aws ec2 authorize-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32

    - name: Setup Docker on EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Install Docker if not installed
          if ! command -v docker &> /dev/null; then
            sudo apt-get update
            sudo apt-get install -y apt-transport-https ca-certificates curl software-properties-common
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -
            sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
            sudo apt-get update
            sudo apt-get install -y docker-ce
          fi

          # Install Docker Compose if not installed
          if ! command -v docker-compose &> /dev/null; then
            sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.1/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
            sudo chmod +x /usr/local/bin/docker-compose
          fi

          # Add user to docker group and restart Docker
          sudo usermod -aG docker ubuntu
          sudo systemctl restart docker

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Fix Docker permissions
          sudo mkdir -p /home/ubuntu/.docker
          sudo chown -R ubuntu:ubuntu /home/ubuntu/.docker
          sudo chmod -R 755 /home/ubuntu/.docker
          
          # Stop any running services
          cd /home/ubuntu/infofitscore || true
          docker-compose down || true
          cd /home/ubuntu
          
          # Clean up and prepare directory with correct permissions
          sudo rm -rf infofitscore
          mkdir infofitscore
          cd infofitscore
          
          # Initialize git repo with main branch
          git init -b main
          sudo chown -R ubuntu:ubuntu .
          sudo chmod -R 755 .
          
          # Configure git
          git config --local user.email "infofitsoftware@gmail.com"
          git config --local user.name "infofitsoftware"
          
          # Try to add remote and fetch code (with error handling)
          echo "Attempting to clone repository..."
          if [ -n "${{ secrets.GH_PAT }}" ]; then
            # Use GitHub PAT if available
            git remote add origin https://${{ secrets.GH_PAT }}@github.com/infofitsoftware/infofitscore.git
          else
            # Fallback to public repository
            git remote add origin https://github.com/infofitsoftware/infofitscore.git
          fi
          
          # Try to fetch and reset (with error handling)
          if git fetch origin main; then
            git reset --hard origin/main
            git branch --set-upstream-to=origin/main main
            echo "Successfully cloned repository"
          else
            echo "Warning: Could not fetch from repository. Continuing with local deployment..."
            # Create basic structure if git fetch fails
            mkdir -p backend frontend nginx
            echo "Created basic directory structure"
          fi
          
          # Set proper permissions
          echo "Setting proper permissions..."
          sudo chown -R ubuntu:ubuntu .
          sudo find . -type d -exec chmod 755 {} \;
          sudo find . -type f -exec chmod 644 {} \;
          
          # Make all shell scripts executable
          find . -type f -name "*.sh" -exec chmod +x {} \;
          
          # Specifically ensure entrypoint.sh is executable
          if [ -f "backend/entrypoint.sh" ]; then
            chmod +x backend/entrypoint.sh
            echo "Made backend/entrypoint.sh executable"
          else
            echo "Warning: backend/entrypoint.sh not found"
          fi
          
          # Set environment variables
          export SECRET_KEY="${{ secrets.SECRET_KEY }}"
          export DOMAIN_NAME="selftesthub.com"
          
          # Check if deploy.sh exists and is executable
          if [ -f "deploy.sh" ]; then
            chmod +x deploy.sh
            echo "Found deploy.sh, running deployment..."
            ./deploy.sh
          else
            echo "Error: deploy.sh not found"
            exit 1
          fi

    - name: Remove GitHub Actions IP from security group
      if: always()
      run: |
        aws ec2 revoke-security-group-ingress \
          --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
          --protocol tcp \
          --port 22 \
          --cidr ${{ steps.ip.outputs.ipv4 }}/32 