name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  # ============================================
  # FRONTEND TESTS & BUILD
  # ============================================
  frontend-test:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend code
        working-directory: ./frontend
        run: |
          npm run lint 2>/dev/null || echo "⚠️ Lint command not configured, skipping"

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_API_URL: https://www.selftesthub.com/api/v1

      - name: Verify build output
        run: |
          if [ -d "frontend/dist" ]; then
            echo "✅ Frontend build successful"
            du -sh frontend/dist
          else
            echo "❌ Frontend build failed - dist not found"
            exit 1
          fi

  # ============================================
  # BACKEND TESTS & LINT
  # ============================================
  backend-test:
    name: Backend Lint & Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check for syntax errors
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/core/config.py
          python -m py_compile app/db/session.py
          echo "✅ No syntax errors found"

      - name: Verify Alembic migrations (Syntax Check)
        working-directory: ./backend
        run: |
          for file in alembic/versions/*.py; do
            python -m py_compile "$file"
            echo "✅ $file - OK"
          done

      - name: Check for security vulnerabilities
        working-directory: ./backend
        run: |
          pip install safety 2>/dev/null || true
          safety check -r requirements.txt 2>/dev/null || echo "⚠️ Security check completed with warnings"

  # ============================================
  # DEPLOY TO PRODUCTION
  # ============================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [frontend-test, backend-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build frontend
        working-directory: ./frontend
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: https://selftesthub.com/api/v1

      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Copy backend code
          cp -r backend deploy/
          rm -rf deploy/backend/__pycache__ deploy/backend/app/__pycache__
          find deploy/backend -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true

          # Copy frontend build
          cp -r frontend/dist deploy/frontend-dist

          # Copy nginx config
          cp -r nginx deploy/

          # Download AWS RDS SSL certificate
          curl -o deploy/backend/global-bundle.pem https://truststore.pki.rds.amazonaws.com/global/global-bundle.pem

          # Create the deployment archive
          tar -czf deploy.tar.gz deploy/
          echo "📦 Deployment package created:"
          ls -lh deploy.tar.gz

      - name: Test SSH connection
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 60s
          command_timeout: 30s
          script: |
            echo "✅ SSH connection successful!"
            echo "Server: $(hostname)"
            echo "User: $(whoami)"
            python3 --version || echo "⚠️ Python3 not found"

      - name: Transfer deployment package
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PORT || 22 }} ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "📤 Transferring deployment package..."
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -P ${{ secrets.DEPLOY_PORT || 22 }} \
            deploy.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/deploy.tar.gz

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 600s
          command_timeout: 300s
          script: |
            set -e
            echo "🚀 Starting SelfTestHub deployment..."

            # ---- Configuration ----
            DEPLOY_DIR="/home/${{ secrets.DEPLOY_USER }}/selftesthub"
            BACKEND_PORT=8000

            # ---- Extract deployment package ----
            echo "📦 Extracting deployment package..."
            mkdir -p /tmp/deploy-selftesthub
            tar -xzf /tmp/deploy.tar.gz -C /tmp/deploy-selftesthub

            # ---- Setup deployment directory ----
            mkdir -p $DEPLOY_DIR
            cp -r /tmp/deploy-selftesthub/deploy/* $DEPLOY_DIR/ || true

            # ---- Backend Setup ----
            cd $DEPLOY_DIR/backend
            echo "🐍 Setting up Python backend..."

            # Create virtual environment if it doesn't exist
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate

            # Install dependencies
            pip install --upgrade pip
            pip install -r requirements.txt

            # Create .env file
            cat > .env << 'ENV_EOF'
            DATABASE_URL=postgresql://selftesthub:${{ secrets.DB_PASSWORD }}@database-1.c3ea24kmsrmf.ap-south-1.rds.amazonaws.com:5432/Selftesthub?sslmode=verify-full&sslrootcert=./global-bundle.pem
            POSTGRES_SERVER=database-1.c3ea24kmsrmf.ap-south-1.rds.amazonaws.com
            POSTGRES_USER=selftesthub
            POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
            POSTGRES_DB=Selftesthub
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            ALGORITHM=HS256
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            DOMAIN_NAME=selftesthub.com
            CORS_ORIGINS_RAW=http://${{ secrets.DEPLOY_HOST }},https://${{ secrets.DEPLOY_HOST }},http://selftesthub.com,https://selftesthub.com,http://www.selftesthub.com,https://www.selftesthub.com
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
            AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            ENV_EOF

            # Fix leading whitespace from heredoc
            sed -i 's/^            //' .env

            echo "📋 Environment configured (secrets hidden)"

            # ---- Run Alembic Migrations ----
            echo "🗄️ Running database migrations..."
            export PYTHONPATH=$DEPLOY_DIR/backend
            alembic upgrade head || { echo "❌ Alembic migration failed!"; exit 1; }

            # ---- Start/Restart Backend with systemd ----
            echo "🚀 Configuring systemd service for backend..."

            sudo tee /etc/systemd/system/selftesthub-backend.service > /dev/null << SYSTEMD_EOF
            [Unit]
            Description=SelfTestHub FastAPI Backend
            After=network.target

            [Service]
            User=${{ secrets.DEPLOY_USER }}
            WorkingDirectory=$DEPLOY_DIR/backend
            EnvironmentFile=$DEPLOY_DIR/backend/.env
            Environment="PATH=$DEPLOY_DIR/backend/venv/bin"
            ExecStart=$DEPLOY_DIR/backend/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port $BACKEND_PORT --workers 2
            Restart=always
            StandardOutput=syslog
            StandardError=syslog
            SyslogIdentifier=selftesthub-backend

            [Install]
            WantedBy=multi-user.target
            SYSTEMD_EOF

            sudo systemctl daemon-reload
            sudo systemctl enable selftesthub-backend.service
            sudo systemctl restart selftesthub-backend.service

            # ---- Setup NGINX ----
            echo "🌐 Configuring NGINX..."

            if ! command -v nginx &> /dev/null; then
                echo "Nginx not found, installing..."
                if command -v apt-get &> /dev/null; then
                    sudo apt-get update && sudo apt-get -y install nginx
                else
                    sudo yum install -y nginx
                fi
            fi
            
            echo "🛡️ Configuring Firewall for NGINX..."
            if command -v ufw &> /dev/null; then
                sudo ufw allow 'Nginx Full' || true
                sudo ufw reload || true
            fi
            
            sudo mkdir -p /etc/nginx/conf.d

            sudo tee /etc/nginx/conf.d/selftesthub.conf > /dev/null << 'NGINX_EOF'
            server {
                listen 80;
                server_name selftesthub.com www.selftesthub.com;
                client_max_body_size 500M;

                # Frontend static files
                root /home/${{ secrets.DEPLOY_USER }}/selftesthub/frontend-dist;
                index index.html index.htm;

                # Handle SPA routing
                location / {
                    try_files $uri $uri/ /index.html;
                }

                # Backend API
                location /api/v1/ {
                    proxy_pass http://localhost:8000/api/v1/;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_cache_bypass $http_upgrade;
                    proxy_connect_timeout 300s;
                    proxy_send_timeout 300s;
                    proxy_read_timeout 300s;
                }

                # Static files (profile images etc.)
                location /static/ {
                    alias /home/${{ secrets.DEPLOY_USER }}/selftesthub/backend/static/;
                    expires 30d;
                    add_header Cache-Control "public, immutable";
                }
            }
            NGINX_EOF

            # Remove default config
            sudo rm -f /etc/nginx/conf.d/default.conf 2>/dev/null || true
            
            # Start Nginx (so Certbot can verify the domain challenge)
            sudo systemctl enable nginx
            sudo systemctl start nginx

            # ---- Setup SSL (Let's Encrypt) ----
            echo "🔐 Setting up SSL with Let's Encrypt..."
            if [ ! -f /opt/certbot/bin/certbot ]; then
                sudo yum install -y python3 augeas-libs 2>/dev/null || true
                sudo python3 -m venv /opt/certbot/
                sudo /opt/certbot/bin/pip install --upgrade pip
                sudo /opt/certbot/bin/pip install certbot certbot-nginx
            fi
            
            # Run Certbot non-interactively to secure the config
            sudo /opt/certbot/bin/certbot --nginx -n --agree-tos --register-unsafely-without-email -d selftesthub.com -d www.selftesthub.com --redirect || echo "⚠️ Certbot challenge failed (DNS may still be propagating)"

            # Test and restart NGINX to apply SSL
            sudo nginx -t && sudo systemctl restart nginx

            # ---- Fix Permissions ----
            echo "🔒 Fixing permissions..."
            sudo chmod 755 /home/${{ secrets.DEPLOY_USER }}
            sudo chmod -R 755 $DEPLOY_DIR/frontend-dist
            sudo chown -R ${{ secrets.DEPLOY_USER }}:www-data $DEPLOY_DIR/frontend-dist 2>/dev/null || true

            # ---- Health Checks ----
            echo "⏳ Waiting for services to start..."
            sleep 5

            echo "🔍 Running health checks..."

            # Check backend
            BACKEND_HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:$BACKEND_PORT/ 2>/dev/null || echo "000")
            if [ "$BACKEND_HEALTH" = "200" ]; then
              echo "✅ Backend is running (HTTP $BACKEND_HEALTH)"
            else
              echo "❌ Backend returned HTTP $BACKEND_HEALTH. It probably crashed!"
              echo "Last 20 lines of backend log:"
              sudo journalctl -u selftesthub-backend.service -n 20 --no-pager || echo "No log available"
              exit 1
            fi

            # Check frontend via NGINX
            FRONTEND_CHECK=$(curl -s -o /dev/null -w "%{http_code}" http://localhost 2>/dev/null || echo "000")
            if [ "$FRONTEND_CHECK" = "200" ] || [ "$FRONTEND_CHECK" = "304" ]; then
              echo "✅ Frontend accessible via NGINX (HTTP $FRONTEND_CHECK)"
            else
              echo "⚠️ Frontend returned HTTP $FRONTEND_CHECK"
            fi

            # ---- Cleanup ----
            rm -rf /tmp/deploy-selftesthub /tmp/deploy.tar.gz

            echo "=========================================="
            echo "🎉 DEPLOYMENT COMPLETE!"
            echo "=========================================="
            echo "🌐 Frontend:  https://selftesthub.com"
            echo "🔧 Swagger:   https://selftesthub.com/api/v1/docs"
            echo "📋 Logs:      sudo journalctl -u selftesthub-backend -f"
            echo "=========================================="

      - name: Deployment Summary
        if: always()
        run: |
          echo "🎯 CI/CD Pipeline Summary"
          echo "========================="
          echo "Frontend Build: ${{ needs.frontend-test.result }}"
          echo "Backend Check:  ${{ needs.backend-test.result }}"
          echo "Deployment:     ${{ job.status }}"
          echo "Application:    https://selftesthub.com"

  # ============================================
  # DEPLOYMENT NOTIFICATION
  # ============================================
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment Status
        run: |
          echo "=========================================="
          echo "Deployment Status: ${{ needs.deploy.result }}"
          echo "=========================================="
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "✅ SelfTestHub deployed successfully!"
            echo "🌐 Access at: https://selftesthub.com"
          else
            echo "❌ Deployment failed! Check logs for details."
          fi
