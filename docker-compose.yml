version: '3.8'

services:
  nginx:
    container_name: infofitscore_nginx
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - app_network

  backend:
    container_name: infofitscore_backend
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/infofitscore
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    container_name: infofitscore_frontend
    build: ./frontend
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://selftesthub.com/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    restart: always
    networks:
      - app_network

  db:
    container_name: infofitscore_db
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=infofitsoftware
      - POSTGRES_DB=postgres
    expose:
      - "5432"
    restart: always
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  backend_logs:
  nginx_cache:
  nginx_run: 