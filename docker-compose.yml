version: '3.8'

services:
  nginx:
    container_name: selftesthub_nginx
    build: 
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - app_network

  backend:
    container_name: selftesthub_backend
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    volumes:
      - ./backend:/app
    expose:
      - 8000
    env_file:
      - ./backend/.env
    environment:
      - DOMAIN_NAME=selftesthub.com
      - CORS_ORIGINS_RAW=http://localhost:3000,https://localhost:3000,http://selftesthub.com,https://selftesthub.com,http://www.selftesthub.com,https://www.selftesthub.com
    networks:
      - app_network

  frontend:
    container_name: selftesthub_frontend
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://backend:8000
    expose:
      - 3000
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app_network:
    driver: bridge