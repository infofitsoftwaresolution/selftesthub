version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    expose:
      - "8000"
    environment:
      - POSTGRES_SERVER=infofitscore.c7yic444gxi0.ap-south-1.rds.amazonaws.com
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=infofitsoftware
      - POSTGRES_DB=postgres
      - DOMAIN_NAME=selftesthub.com
      - CORS_ORIGINS=https://selftesthub.com
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    environment:
      - NODE_ENV=production
      - VITE_API_URL=https://selftesthub.com/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "3000"
    restart: always

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=infofitsoftware
      - POSTGRES_DB=postgres
    expose:
      - "5432"
    restart: always

volumes:
  postgres_data:
  backend_logs: 