version: '3.8'

services:
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=infofitscore.c7yic444gxi0.ap-south-1.rds.amazonaws.com
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=infofitsoftware
      - POSTGRES_DB=postgres
      - EC2_PUBLIC_IP=${EC2_PUBLIC_IP}
      - CORS_ORIGINS=http://13.233.157.162:3000,http://localhost:3000
    depends_on:
      - db

  frontend:
    build: ./frontend
    environment:
      - NODE_ENV=production
      - API_URL=http://${EC2_PUBLIC_IP}:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

  db:
    image: postgres:13
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=infofitsoftware
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"

volumes:
  postgres_data:
  backend_logs: 