version: '3.8'

services:
  backend:
    container_name: infofitscore_backend_dev
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:admin@db:5432/postgres
      - POSTGRES_SERVER=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=postgres
      - DOMAIN_NAME=localhost
      - CORS_ORIGINS_RAW=http://localhost:3000,https://localhost:3000,http://127.0.0.1:3000
      - CORS_ALLOW_CREDENTIALS=true
    depends_on:
      - db
    networks:
      - app_network_dev

  frontend:
    container_name: infofitscore_frontend_dev
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - app_network_dev
    depends_on:
      - backend

  db:
    container_name: infofitscore_db_dev
    image: postgres:13
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=postgres
    networks:
      - app_network_dev

networks:
  app_network_dev:
    driver: bridge

volumes:
  postgres_data_dev: 